# Nginx config for Claude Remote (optional - for HTTPS/domain)
# Save to /etc/nginx/sites-available/claude-remote

server {
    listen 80;
    server_name claude.yourdomain.com;  # Replace with your domain

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# After saving, run:
# sudo ln -s /etc/nginx/sites-available/claude-remote /etc/nginx/sites-enabled/
# sudo certbot --nginx -d claude.yourdomain.com
# sudo systemctl restart nginx
